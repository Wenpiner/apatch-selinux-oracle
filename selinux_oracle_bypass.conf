# selinux_oracle_bypass.conf
#
# 部署位置（推荐）：/data/adb/kpm/selinux_oracle_bypass.conf
#
# 格式：
#   - 每行一个关键字（对 /proc/self/attr/* 写入内容做子串匹配）
#   - '#' 开头的行视为注释；空行忽略
#   - 行首/行尾空白自动 trim
#
# 命中任意一条 → security_setprocattr 直接返回 -EINVAL，
# 与"内核根本不认识该 SELinux 域"完全等价。
#
# 注意：本文件中追加的关键字会与 KPM 内置默认列表合并（前提是加载时
# args 含 "default,config=..."；如果只写 "config=..." 则仅使用文件内容）。
#
# 内置默认已覆盖：magisk / kernelsu / kernel_su / ksud / supolicy / :su: / :su\n
# 此处仅追加你想额外屏蔽的关键字即可。

# 例：屏蔽 KernelSU Next / SukiSU 自定义域名
# kernelsu_next
# sukisu

# 例：屏蔽某些 manager 安装时使用的私有 selinux type
# magiskpolicy
# zygisk

# 例：自定义内核厂商私有 root 域
# my_custom_root
# vendor_su
